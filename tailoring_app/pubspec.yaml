name: tailoring_app
description: Tailoring Order Management System - manage tailoring orders, customers, measurements, and reports.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # State + Navigation
  provider: ^6.1.2
  go_router: ^14.2.7

  # Offline / Local
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0

  # REST API
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  pdf: ^3.11.1
  printing: ^5.13.3
  share_plus: ^10.0.2
  video_player: ^2.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
