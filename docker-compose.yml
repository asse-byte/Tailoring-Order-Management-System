# Couture Mali - Root Docker Compose configuration
# Usage (first run for a NEW shop):
#   cp backend/.env.example .env   # edit variables (DB_PASSWORD, JWT_SECRET,
#                                  # SEED_*, SHOP_NAME, DEFAULT_PIECE_RATE…)
#   docker compose up -d --build
#   docker compose exec api npm run setup-shop  # migrate + 2 accounts + identity
# See docs/DEPLOYMENT.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: couture_mali
      POSTGRES_USER: couture
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U couture -d couture_mali"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://couture:${DB_PASSWORD}@db:5432/couture_mali
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: 3000
      SEED_MANAGER_USERNAME: ${SEED_MANAGER_USERNAME:-}
      SEED_MANAGER_PASSWORD: ${SEED_MANAGER_PASSWORD:-}
      SEED_MANAGER_NAME: ${SEED_MANAGER_NAME:-}
      SEED_SECRETARY_USERNAME: ${SEED_SECRETARY_USERNAME:-}
      SEED_SECRETARY_PASSWORD: ${SEED_SECRETARY_PASSWORD:-}
      SEED_SECRETARY_NAME: ${SEED_SECRETARY_NAME:-}
      # Shop identity for `npm run setup-shop` (per-shop branding).
      SHOP_NAME: ${SHOP_NAME:-}
      DEFAULT_PIECE_RATE: ${DEFAULT_PIECE_RATE:-0}
      PROMO_GROUP_LINK: ${PROMO_GROUP_LINK:-}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  pgdata:
  uploads_data:
